<div class="calc-title-row">
<h2>Калькулятор <span class="calc-page-version" id="calc-page-version-badge" title="Версия страницы — для проверки обновления"></span></h2>
<div class="calc-title-actions" style="display:flex;flex-wrap:wrap;align-items:center;gap:.5rem .75rem;">
<a class="calc-btn calc-btn-secondary" [href]="helpUrl" target="_blank" rel="noopener" title="Справка по калькулятору">Справка</a>
<label class="account-mode" for="account-mode">Кошелёк:
<select id="account-mode" [formControl]="accountMode">
<option value="paper" selected>Фиктивный кошелёк</option>
<option value="tbank">T-Bank торговый счёт (депозит)</option>
<option value="live">Реальная торговля T-Bank</option>
</select>
</label>
</div>
</div>
<div class="file-protocol-warn" id="file-protocol-warn" hidden>
<b>Открыто как файл (file://)</b> — MOEX ISS из браузера недоступен (CORS).
Блок <strong>«Реальная торговля»</strong> ниже появляется сразу при выборе режима в «Кошелёк».
Для MOEX запустите <code>run-dev.bat</code> → <code>http://127.0.0.1:4200/finresp</code>.
</div>
